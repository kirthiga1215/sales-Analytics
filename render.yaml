# Render Blueprint — Deploys both services in one click
# https://render.com/docs/blueprint-spec

services:
  # ============ Backend API ============
  - type: web
    name: sales-analytics-api
    runtime: docker
    repo: https://github.com/kirthiga1215/sales-Analytics
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false  # You'll paste your Render DB URL in the dashboard
      - key: PORT
        value: "4000"
      - key: CORS_ORIGIN
        value: https://sales-analytics-frontend.onrender.com
      - key: NODE_ENV
        value: production
    healthCheckPath: /health

  # ============ Frontend Dashboard ============
  - type: web
    name: sales-analytics-frontend
    runtime: docker
    repo: https://github.com/kirthiga1215/sales-Analytics
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sales-analytics-api.onrender.com/api
      - key: NODE_ENV
        value: production